version: "3.9"

services:
  db:
    image: postgres:15
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0 -p 3001"
    volumes:
      - .:/myapp
    ports:
      - "3001:3001"
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: oauth_client
    depends_on:
      - db

  kafka-consumer:
    build: .
    command: bash -c "bundle exec rake db:migrate && bundle exec rake kafka:consume"
    volumes:
      - .:/myapp
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: oauth_client
    depends_on:
      - db
      - web

volumes:
  db-data:

# Useful Commands
# docker-compose run web bundle exec rake db:drop db:create db:migrate db:seed
# docker-compose run web bundle exec rails c