version: "3.9"

services:
  db:
    image: postgres:15
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0 -p 3001"
    volumes:
      - .:/myapp
    ports:
      - "3001:3001"
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: oauth_client
      # OAUTH_HOST: http://idp.myapp.local
      OAUTH_HOST: http://host.docker.internal:3000
      OAUTH_CLIENT_ID: web-frontend-app-client-id
      OAUTH_CLIENT_SECRET: web-frontend-app-client-secret
    depends_on:
      - db

  kafka-consumer:
    build: .
    command: ["bundle", "exec", "rake", "kafka:consume"]
    volumes:
      - .:/myapp
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: oauth_client
      # KAFKA_BROKERS: kafka-idp:9092
      KAFKA_BROKERS: host.docker.internal:9092
    depends_on:
      - db
      - web

volumes:
  db-data:

# Useful Commands
# docker-compose run web bundle exec rake db:drop db:create db:migrate db:seed
# docker-compose run web bundle exec rails c